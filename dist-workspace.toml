[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-musl", "x86_64-apple-darwin", "x86_64-unknown-linux-musl"]
# Which actions to run on pull requests
pr-run-mode = "plan"
# Path that installers should place binaries in
install-path = "~/.local/bin"
# Whether to install an updater program
install-updater = false

# dist defaults to aging runner labels (retired Intel macos-13, ubuntu-22.04);
# use evergreen/latest labels so runner retirements can't stall releases.
# x86_64 mac cross-compiles on ARM with the same Apple toolchain; aarch64
# linux builds natively on the free ARM runners.
[dist.github-custom-runners]
global = "ubuntu-latest"
aarch64-apple-darwin = "macos-latest"
x86_64-apple-darwin = "macos-latest"
aarch64-unknown-linux-musl = "ubuntu-24.04-arm"
x86_64-unknown-linux-musl = "ubuntu-latest"
